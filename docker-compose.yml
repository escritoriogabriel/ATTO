version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: atto-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-atto_db}
      MYSQL_USER: ${DB_USER:-atto_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-atto_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - atto-network

  # Node.js Application (Development)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: atto-app
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${DB_USER:-atto_user}:${DB_PASSWORD:-atto_password}@mysql:3306/${DB_NAME:-atto_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      VITE_APP_ID: ${VITE_APP_ID:-local-dev}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-http://localhost:3000}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-http://localhost:3000}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-http://localhost:3000}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-dev-key}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-http://localhost:3000}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-dev-key}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-dev-owner}
      OWNER_NAME: ${OWNER_NAME:-Developer}
    ports:
      - "${APP_PORT:-3000}:3000"
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.pnpm-store
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - atto-network
    command: pnpm dev

volumes:
  mysql_data:
    driver: local

networks:
  atto-network:
    driver: bridge
